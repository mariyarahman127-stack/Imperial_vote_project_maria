<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ICE Voting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗳️</text></svg>">
</head>
<body>
    <div class="bg-animation">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1rem;">
                        <span class="logo-icon">🗳️</span>
                        <span class="logo-text">ICE Voting</span>
                    </a>
                    <h1>Imperial College of Engineering</h1>
                    <p style="color: var(--accent);">College President Election 2026</p>
                    <p style="margin-top: 1rem;">Enter your email to vote</p>
                </div>

                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-input" placeholder="your.email@university.edu" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Continue to Vote
                    </button>
                </form>

                <div style="margin-top: 1.5rem; padding: 1rem; background: rgba(0, 217, 165, 0.1); border: 1px solid var(--success); border-radius: var(--radius-md); text-align: center;">
                    <p style="color: var(--success); font-size: 0.85rem; margin: 0;">
                        ✅ Enter any valid email to vote<br>
                        🔒 One vote per email address
                    </p>
                </div>

                <div style="margin-top: 1rem; text-align: center;">
                    <a href="admin.html" style="color: var(--text-secondary); font-size: 0.85rem;">
                        👑 Admin Login
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.toLowerCase().trim();
            
            if (!email) {
                alert('Please enter your email');
                return;
            }
            
            // Check if already voted
            try {
                const res = await fetch(`${API_URL}/api/check-vote/${encodeURIComponent(email)}`);
                const data = await res.json();
                
                if (data.hasVoted) {
                    alert('This email has already been used to vote!');
                    return;
                }
            } catch (err) {
                console.log('API not available, using local mode');
            }
            
            // Store user and redirect
            const user = {
                email: email,
                loginTime: new Date().toISOString()
            };
            
            localStorage.setItem('voterUser', JSON.stringify(user));
            window.location.href = 'vote.html';
        });
    </script>
</body>
</html>
