<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ICE Voting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗳️</text></svg>">
</head>
<body>
    <div class="bg-animation">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1rem;">
                        <span class="logo-icon">🗳️</span>
                        <span class="logo-text">ICE Voting</span>
                    </a>
                    <h1>👑 Admin Panel</h1>
                    <p style="color: var(--accent);">Restricted Access</p>
                </div>

                <form id="admin-form">
                    <div class="form-group">
                        <label class="form-label">Admin Key</label>
                        <input type="password" id="admin-key" class="form-input" placeholder="Enter admin key" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Access Dashboard
                    </button>
                </form>

                <div style="margin-top: 1.5rem; text-align: center;">
                    <a href="index.html" style="color: var(--text-secondary); font-size: 0.85rem;">
                        ← Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('admin-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const key = document.getElementById('admin-key').value;
            
            if (key === 'admin2026') {
                localStorage.setItem('adminUser', JSON.stringify({ role: 'admin', loginTime: new Date().toISOString() }));
                window.location.href = 'admin-dashboard.html';
            } else {
                alert('Invalid admin key');
            }
        });
    </script>
</body>
</html>
