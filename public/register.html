<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - UniVote</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 28px;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #5a6fd6;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .success-message {
            background: #d1fae5;
            border: 1px solid #10b981;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            color: #065f46;
            display: none;
        }
        
        .error-message {
            background: #fee2e2;
            border: 1px solid #ef4444;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-color: #991b1b;
            display: none;
        }
        .password-wrapper { position: relative; display: inline-block; width: 100%; }
        .password-wrapper input { width: 100%; padding-right: 40px; }
        .password-toggle {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; cursor: pointer; color: #666;
            font-size: 16px;
            padding: 5px;
            z-index: 10;
        }
        .password-toggle:hover { color: #2563eb; }
        .camera-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
        }
        .camera-container.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .camera-container video {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
        }
        .camera-container canvas {
            display: none;
        }
        .camera-controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        .btn-capture {
            padding: 12px 30px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        .btn-cancel-camera {
            padding: 12px 30px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        .btn-take-photo {
            display: inline-block;
            padding: 10px 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-top: 10px;
        }
        .photo-section-bottom {
            border: 2px dashed #667eea;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #f8f9ff 0%, #eef2ff 100%);
        }
        .photo-section-bottom .photo-preview-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #667eea;
            margin: 0 auto 15px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .photo-section-bottom .photo-preview-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .photo-section-bottom .photo-preview-container .placeholder {
            font-size: 40px;
            color: #667eea;
        }
    </style>
</head>
<body data-page="register">
    <div class="register-card">
        <div class="logo">
            <h1>🗳️ UniVote</h1>
            <p>Create Your Account</p>
        </div>

        <div id="success-message" class="success-message">
            Account created successfully! Redirecting to login...
        </div>
        
        <div id="error-message" class="error-message"></div>

        <form id="register-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">University Email</label>
                <input type="email" id="email" placeholder="19131@imperial.edu.bd" required>
            </div>

            <div class="form-group">
                <label for="studentId">Student ID</label>
                <input type="text" id="studentId" placeholder="Enter your student ID" required>
            </div>

            <div class="form-group">
                <label for="department">Name of the Department</label>
                <select id="department" class="form-input" required>
                    <option value="">Select your department</option>
                    <option value="CSE">Computer Science & Engineering (CSE)</option>
                    <option value="EEE">Electrical & Electronic Engineering (EEE)</option>
                    <option value="CE">Civil Engineering (CE)</option>
                    <option value="ME">Mechanical Engineering (ME)</option>
                    <option value="TE">Textile Engineering (TE)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password">Create Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Create a strong password" required minlength="8">
                    <button type="button" class="password-toggle" onclick="togglePassword('password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <small style="color: #666; font-size: 12px; margin-top: 5px; display: block;">
                    💡 Use at least 8 characters with uppercase, lowercase, numbers & special characters for a strong password
                </small>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm-password" placeholder="Confirm your password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('confirm-password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="photo-section-bottom">
                <label style="font-weight: 500; color: #333; display: block; margin-bottom: 10px;">Student Photo <span style="color: red;">*</span></label>
                <div class="photo-preview-container" onclick="document.getElementById('photo-input').click()">
                    <img id="photo-preview" style="display: none;" src="" alt="Preview">
                    <span class="placeholder" id="photo-placeholder">📷</span>
                </div>
                <input type="file" id="photo-input" accept="image/jpeg,image/jpg,image/png,image/*" capture="user" onchange="previewPhoto()" style="display: none;">
                <button type="button" class="btn-take-photo" onclick="openCamera()">📷 Take Photo with Camera</button>
                <p style="font-size: 12px; color: #666; margin-top: 8px;">Click to take your photo</p>
                <p class="photo-error" id="photo-error">Please take your photo</p>
            </div>

            <button type="submit" class="btn" id="submit-btn">
                Create Account
            </button>
        </form>

        <p class="login-link">
            Already have an account? <a href="login.html">Login here</a>
        </p>
    </div>

    <!-- Camera Modal -->
    <div class="camera-container" id="camera-container">
        <video id="camera-video" autoplay playsinline></video>
        <canvas id="camera-canvas"></canvas>
        <div class="camera-controls">
            <button class="btn-capture" onclick="capturePhoto()">📸 Take Photo</button>
            <button class="btn-cancel-camera" onclick="closeCamera()">✕ Cancel</button>
        </div>
    </div>

    <script>
        let photoData = null;
        let cameraStream = null;
        let faceDetectionLoaded = false;
        let faceApiError = null;
        
        // Load face detection models
        async function loadFaceModels() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@face-api/cdn@0.22.2/models';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                faceDetectionLoaded = true;
                console.log('Face detection models loaded successfully');
            } catch (e) {
                console.error('Error loading face models:', e);
                faceApiError = e.message;
                faceDetectionLoaded = false;
            }
        }
        
        // Load models on page load
        loadFaceModels().then(() => {
            console.log('Face API ready:', faceDetectionLoaded);
        });
        
        function togglePassword(inputId) {
            var input = document.getElementById(inputId);
            var btn = input.parentElement.querySelector('.password-toggle i');
            if (input.type === 'password') {
                input.type = 'text';
                btn.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                btn.className = 'fas fa-eye';
            }
        }
        
        function openCamera() {
            const container = document.getElementById('camera-container');
            const video = document.getElementById('camera-video');
            
            container.classList.add('active');
            
            // Try front camera first (selfie camera), fallback to any available camera
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: 'user',
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                } 
            })
                .then(function(stream) {
                    cameraStream = stream;
                    video.srcObject = stream;
                })
                .catch(function(error) {
                    console.error('Front camera error:', error);
                    // Try back camera as fallback
                    navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            facingMode: 'environment',
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        } 
                    })
                    .then(function(stream) {
                        cameraStream = stream;
                        video.srcObject = stream;
                    })
                    .catch(function(err) {
                        console.error('All cameras failed:', err);
                        alert('Could not access camera. Please use file upload option or check camera permissions.');
                        closeCamera();
                    });
                });
        }
        
        async function capturePhoto() {
            const video = document.getElementById('camera-video');
            const canvas = document.getElementById('camera-canvas');
            const preview = document.getElementById('photo-preview');
            const placeholder = document.getElementById('photo-placeholder');
            const photoError = document.getElementById('photo-error');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            // Detect faces in the image (only if models loaded successfully)
            if (faceDetectionLoaded && faceapi) {
                try {
                    const detections = await faceapi.detectAllFaces(canvas, new faceapi.TinyFaceDetectorOptions());
                    
                    if (detections.length === 0) {
                        // No face detected - show warning but allow retry
                        photoError.textContent = 'No face detected! Please position your face in the center.';
                        photoError.style.display = 'block';
                        return;
                    }
                    
                    if (detections.length > 1) {
                        // Multiple faces detected
                        photoError.textContent = 'Multiple faces detected! Please take a photo with only your face.';
                        photoError.style.display = 'block';
                        return;
                    }
                    
                    // Check if face is large enough (at least 15% of image)
                    const detection = detections[0];
                    const faceBox = detection.box;
                    const canvasArea = canvas.width * canvas.height;
                    const faceArea = faceBox.width * faceBox.height;
                    const faceRatio = faceArea / canvasArea;
                    
                    if (faceRatio < 0.15) {
                        photoError.textContent = 'Please move closer! Your face should be larger in the photo.';
                        photoError.style.display = 'block';
                        return;
                    }
                    
                    console.log('Face detected successfully:', detections[0]);
                } catch (e) {
                    console.error('Face detection error:', e);
                    // Allow photo if face detection fails
                }
            } else if (faceApiError) {
                console.log('Face detection not available:', faceApiError);
                // Allow photo if face detection models failed to load
            }
            
            // Use 100% quality for larger image size
            photoData = canvas.toDataURL('image/jpeg', 1.0);
            
            preview.src = photoData;
            preview.style.display = 'block';
            placeholder.style.display = 'none';
            
            closeCamera();
            
            document.getElementById('photo-error').style.display = 'none';
        }
        
        function closeCamera() {
            const container = document.getElementById('camera-container');
            container.classList.remove('active');
            
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
        }
        
        async function previewPhoto() {
            const input = document.getElementById('photo-input');
            const preview = document.getElementById('photo-preview');
            const placeholder = document.getElementById('photo-placeholder');
            const error = document.getElementById('photo-error');
            
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                // Validate file type
                if (!file.type.match('image.*')) {
                    error.textContent = 'Please select a valid image file';
                    error.style.display = 'block';
                    return;
                }
                
                // Validate file size (max 2MB)
                if (file.size > 2 * 1024 * 1024) {
                    error.textContent = 'Image size must be less than 2MB';
                    error.style.display = 'block';
                    return;
                }
                
                error.style.display = 'none';
                
                const reader = new FileReader();
                reader.onload = async function(e) {
                    photoData = e.target.result;
                    preview.src = photoData;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                    
                    // Check for face in uploaded image (only if models loaded)
                    if (faceDetectionLoaded && faceapi) {
                        try {
                            const img = new Image();
                            img.src = photoData;
                            await new Promise(resolve => img.onload = resolve);
                            
                            const detections = await faceapi.detectAllFaces(img, new faceapi.TinyFaceDetectorOptions());
                            
                            if (detections.length === 0) {
                                error.textContent = 'No face detected! Please upload a photo with your face clearly visible.';
                                error.style.display = 'block';
                                preview.style.display = 'none';
                                placeholder.style.display = 'block';
                                photoData = null;
                                return;
                            }
                            
                            if (detections.length > 1) {
                                error.textContent = 'Multiple faces detected! Please upload a photo with only your face.';
                                error.style.display = 'block';
                                preview.style.display = 'none';
                                placeholder.style.display = 'block';
                                photoData = null;
                                return;
                            }
                            
                            console.log('Face detected in uploaded image:', detections[0]);
                        } catch (e) {
                            console.error('Face detection error:', e);
                            // Allow photo if face detection fails
                        }
                    }
                };
                reader.readAsDataURL(file);
            }
        }
        
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.toLowerCase().trim();
            const studentId = document.getElementById('studentId').value.trim();
            const department = document.getElementById('department').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const submitBtn = document.getElementById('submit-btn');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');
            const photoError = document.getElementById('photo-error');
            
            // Validate photo is uploaded
            if (!photoData) {
                photoError.textContent = 'Please take your photo with camera';
                photoError.style.display = 'block';
                return;
            }
            photoError.style.display = 'none';
            
            // Validate student ID
            if (!studentId || studentId.length < 4) {
                errorMessage.textContent = 'Please enter a valid student ID';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Validate department
            if (!department) {
                errorMessage.textContent = 'Please select your department';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Reset messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            // Validate email format
            const emailRegex = /^[0-9]{5}@imperial\.edu\.bd$/i;
            if (!emailRegex.test(email)) {
                errorMessage.textContent = 'Please use valid university email: 5-digitID@imperial.edu.bd';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Validate password match
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match!';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Validate password strength
            const passwordErrors = [];
            if (password.length < 8) {
                passwordErrors.push('at least 8 characters');
            }
            if (!/[A-Z]/.test(password)) {
                passwordErrors.push('at least one uppercase letter');
            }
            if (!/[a-z]/.test(password)) {
                passwordErrors.push('at least one lowercase letter');
            }
            if (!/[0-9]/.test(password)) {
                passwordErrors.push('at least one number');
            }
            if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) {
                passwordErrors.push('at least one special character (!@#$%^&*()_+-=[]{};\':"\\|,.<>/?)');
            }
            
            if (passwordErrors.length > 0) {
                errorMessage.textContent = 'Password must contain: ' + passwordErrors.join(', ');
                errorMessage.style.display = 'block';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';
            
            // Call the API for registration
            fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: email,
                    name: name,
                    studentId: studentId,
                    department: department,
                    password: password,
                    photo: photoData
                })
            })
            .then(function(response) {
                return response.json();
            })
            .then(function(result) {
                if (result.success) {
                    // Show success
                    successMessage.style.display = 'block';
                    submitBtn.textContent = 'Account Created!';
                    
                    // Redirect to login after 2 seconds
                    setTimeout(function() {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    errorMessage.textContent = result.message || 'Registration failed';
                    errorMessage.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }
            })
            .catch(function(error) {
                console.error('Registration error:', error);
                errorMessage.textContent = 'An error occurred. Please try again.';
                errorMessage.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            });
        });
    </script>
</body>
</html>
