<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - UniVote</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Face-api.js for face detection -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 28px;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #5a6fd6;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .success-message {
            background: #d1fae5;
            border: 1px solid #10b981;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            color: #065f46;
            display: none;
        }
        
        .error-message {
            background: #fee2e2;
            border: 1px solid #ef4444;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-color: #991b1b;
            display: none;
        }
        .password-wrapper { position: relative; display: inline-block; width: 100%; }
        .password-wrapper input { width: 100%; padding-right: 40px; }
        .password-toggle {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; cursor: pointer; color: #666;
            font-size: 16px;
            padding: 5px;
            z-index: 10;
        }
        .password-toggle:hover { color: #2563eb; }
        .camera-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
        }
        .camera-container.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .camera-container video {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
        }
        .camera-container canvas {
            display: none;
        }
        .camera-controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        .btn-capture {
            padding: 12px 30px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        .btn-cancel-camera {
            padding: 12px 30px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        .btn-take-photo {
            display: inline-block;
            padding: 10px 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-top: 10px;
        }
        .photo-section-bottom {
            border: 2px dashed #667eea;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #f8f9ff 0%, #eef2ff 100%);
        }
        .photo-section-bottom .photo-preview-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #667eea;
            margin: 0 auto 15px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .photo-section-bottom .photo-preview-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .photo-section-bottom .photo-preview-container .placeholder {
            font-size: 40px;
            color: #667eea;
        }
    </style>
</head>
<body data-page="register">
    <div class="register-card">
        <div class="logo">
            <h1>🗳️ UniVote</h1>
            <p>Create Your Account</p>
        </div>

        <div id="success-message" class="success-message">
            Account created successfully! Redirecting to login...
        </div>
        
        <div id="error-message" class="error-message"></div>

        <form id="register-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">University Email</label>
                <input type="email" id="email" placeholder="19131@imperial.edu.bd" required>
            </div>

            <div class="form-group">
                <label for="studentId">Student ID</label>
                <input type="text" id="studentId" placeholder="Enter your student ID" required>
            </div>

            <div class="form-group">
                <label for="department">Name of the Department</label>
                <select id="department" class="form-input" required>
                    <option value="">Select your department</option>
                    <option value="CSE">Computer Science & Engineering (CSE)</option>
                    <option value="EEE">Electrical & Electronic Engineering (EEE)</option>
                    <option value="CE">Civil Engineering (CE)</option>
                    <option value="ME">Mechanical Engineering (ME)</option>
                    <option value="TE">Textile Engineering (TE)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password">Create Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" placeholder="Create a password" required minlength="6" style="width: 100%; padding: 14px; padding-right: 45px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; box-sizing: border-box;">
                    <span onclick="document.getElementById('password').type = document.getElementById('password').type === 'password' ? 'text' : 'password'" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px;">👁️</span>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <div style="position: relative;">
                    <input type="password" id="confirm-password" placeholder="Confirm your password" required style="width: 100%; padding: 14px; padding-right: 45px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; box-sizing: border-box;">
                    <span onclick="document.getElementById('confirm-password').type = document.getElementById('confirm-password').type === 'password' ? 'text' : 'password'" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px;">👁️</span>
                </div>
            </div>

            <div class="photo-section-bottom">
                <label style="font-weight: 500; color: #333; display: block; margin-bottom: 10px;">Student Photo <span style="color: red;">*</span></label>
                <div class="photo-preview-container" onclick="document.getElementById('photo-input').click()">
                    <img id="photo-preview" style="display: none;" src="" alt="Preview">
                    <span class="placeholder" id="photo-placeholder">📷</span>
                </div>
                <input type="file" id="photo-input" accept="image/*" capture="environment" onchange="previewPhoto()" style="display: none;">
                <button type="button" class="btn-take-photo" onclick="document.getElementById('photo-input').click()">📷 Take Photo with Camera</button>
                <p style="font-size: 12px; color: #666; margin-top: 8px;">Click to take your photo with camera or select from gallery</p>
                <p class="photo-error" id="photo-error">Please take your photo</p>
            </div>

            <button type="submit" class="btn" id="submit-btn">
                Create Account
            </button>
        </form>

        <p class="login-link">
            Already have an account? <a href="login.html">Login here</a>
        </p>
    </div>

    <!-- Camera Modal -->
    <div class="camera-container" id="camera-container">
        <video id="camera-video" autoplay playsinline></video>
        <canvas id="camera-canvas"></canvas>
        <div class="camera-controls">
            <button class="btn-capture" onclick="capturePhoto()">📸 Take Photo</button>
            <button class="btn-cancel-camera" onclick="closeCamera()">✕ Cancel</button>
        </div>
    </div>

    <script>
        let photoData = null;
        let cameraStream = null;
        let faceDetectionLoaded = false;

        // Load face detection models on page load
        async function loadFaceModels() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@face-api/cdn@0.22.2/models';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                faceDetectionLoaded = true;
                console.log('Face detection loaded');
            } catch (e) {
                console.error('Face detection load error:', e);
                faceDetectionLoaded = false;
            }
        }
        loadFaceModels();

        function togglePassword(inputId) {
            var input = document.getElementById(inputId);
            var wrapper = input.closest('.password-wrapper');
            if (!wrapper) {
                // Fallback: look for next sibling button
                var btn = input.nextElementSibling;
                if (btn && btn.classList.contains('password-toggle')) {
                    if (input.type === 'password') {
                        input.type = 'text';
                        btn.innerHTML = '<i class="fas fa-eye-slash"></i>';
                    } else {
                        input.type = 'password';
                        btn.innerHTML = '<i class="fas fa-eye"></i>';
                    }
                }
                return;
            }
            var btn = wrapper.querySelector('.password-toggle');
            if (input.type === 'password') {
                input.type = 'text';
                if (btn) btn.innerHTML = '<i class="fas fa-eye-slash"></i>';
            } else {
                input.type = 'password';
                if (btn) btn.innerHTML = '<i class="fas fa-eye"></i>';
            }
        }
        
        function openCamera() {
            const container = document.getElementById('camera-container');
            const video = document.getElementById('camera-video');
            
            container.classList.add('active');
            
            // Try front camera first (for selfie), fallback to any camera
            const constraints = { 
                video: { 
                    facingMode: 'user'
                } 
            };
            
            navigator.mediaDevices.getUserMedia(constraints)
            .then(function(stream) {
                cameraStream = stream;
                video.srcObject = stream;
                video.play();
            })
            .catch(function(error) {
                console.error('Camera error:', error);
                // Try any available camera without facingMode
                navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(stream) {
                    cameraStream = stream;
                    video.srcObject = stream;
                    video.play();
                })
                .catch(function(err) {
                    console.error('All cameras failed:', err);
                    closeCamera();
                    alert('Could not access camera. Please allow camera permission in your browser settings, or upload a photo from gallery instead.');
                });
            });
        }
        
        function capturePhoto() {
            const video = document.getElementById('camera-video');
            const canvas = document.getElementById('camera-canvas');
            const preview = document.getElementById('photo-preview');
            const placeholder = document.getElementById('photo-placeholder');
            const photoError = document.getElementById('photo-error');

            // Wait for video to be ready
            if (!video.videoWidth || !video.videoHeight || video.readyState < 2) {
                photoError.textContent = 'Camera is not ready. Please wait a moment and try again.';
                photoError.style.display = 'block';
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            // Check for face if face detection is loaded
            if (faceDetectionLoaded && typeof faceapi !== 'undefined') {
                try {
                    const detections = faceapi.detectAllFacesSync(canvas, new faceapi.TinyFaceDetectorOptions());

                    if (!detections || detections.length === 0) {
                        photoError.textContent = 'This is not your Facial Image. Please Give the Correct Image that Recognized you in Future. Thanks For your efforts and participating on the Election 😊';
                        photoError.style.display = 'block';
                        return;
                    }

                    if (detections.length > 1) {
                        photoError.textContent = 'Multiple faces detected! Please take a photo with only your face.';
                        photoError.style.display = 'block';
                        return;
                    }

                    console.log('Face detected:', detections[0]);
                } catch (e) {
                    console.log('Face detection error:', e);
                }
            }

            // Use 100% quality - no size limit
            photoData = canvas.toDataURL('image/jpeg', 1.0);

            preview.src = photoData;
            preview.style.display = 'block';
            placeholder.style.display = 'none';
            document.getElementById('photo-error').style.display = 'none';
        }
        
        function closeCamera() {
            const container = document.getElementById('camera-container');
            container.classList.remove('active');
            
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
        }
        
        function previewPhoto() {
            const input = document.getElementById('photo-input');
            const preview = document.getElementById('photo-preview');
            const placeholder = document.getElementById('photo-placeholder');
            const error = document.getElementById('photo-error');
            
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                // Validate file type
                if (!file.type.match('image.*')) {
                    error.textContent = 'Please select a valid image file';
                    error.style.display = 'block';
                    return;
                }
                
                // No file size limit anymore
                
                error.style.display = 'none';
                
                const reader = new FileReader();
                reader.onload = async function(e) {
                    photoData = e.target.result;
                    preview.src = photoData;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                    error.style.display = 'none';

                    // Check for face if face detection is loaded
                    if (faceDetectionLoaded && typeof faceapi !== 'undefined') {
                        try {
                            const img = new Image();
                            img.src = photoData;
                            await new Promise(resolve => img.onload = resolve);

                            const detections = await faceapi.detectAllFaces(img, new faceapi.TinyFaceDetectorOptions());

                            if (detections.length === 0) {
                                error.textContent = 'This is not your Facial Image. Please Give the Correct Image that Recognized you in Future. Thanks For your efforts and participating on the Election 😊';
                                error.style.display = 'block';
                                preview.style.display = 'none';
                                placeholder.style.display = 'block';
                                photoData = null;
                                return;
                            }

                            if (detections.length > 1) {
                                error.textContent = 'Multiple faces detected! Please upload a photo with only your face.';
                                error.style.display = 'block';
                                preview.style.display = 'none';
                                placeholder.style.display = 'block';
                                photoData = null;
                                return;
                            }

                            console.log('Face detected in upload:', detections[0]);
                        } catch (e) {
                            console.log('Face detection error:', e);
                        }
                    }
                };
                reader.onerror = function(e) {
                    error.textContent = 'Error reading image file';
                    error.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }
        
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.toLowerCase().trim();
            const studentId = document.getElementById('studentId').value.trim();
            const department = document.getElementById('department').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const submitBtn = document.getElementById('submit-btn');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');
            const photoError = document.getElementById('photo-error');
            
            // Validate photo is required
            if (!photoData) {
                photoError.textContent = 'Please take your photo with camera';
                photoError.style.display = 'block';
                return;
            }
            photoError.style.display = 'none';
            
            // Validate student ID
            if (!studentId || studentId.length < 4) {
                errorMessage.textContent = 'Please enter a valid student ID';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Validate department
            if (!department) {
                errorMessage.textContent = 'Please select your department';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Reset messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            // Validate email format - accept any student ID format
            const emailRegex = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/i;
            if (!emailRegex.test(email)) {
                errorMessage.textContent = 'Please use a valid email address';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Validate password match
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match!';
                errorMessage.style.display = 'block';
                return;
            }

            // Simple password validation - minimum 6 characters
            if (password.length < 6) {
                errorMessage.textContent = 'Password must be at least 6 characters';
                errorMessage.style.display = 'block';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';
            
            // Call the API for registration
            fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: email,
                    name: name,
                    studentId: studentId,
                    department: department,
                    password: password,
                    photo: photoData || null
                })
            })
            .then(function(response) {
                return response.json();
            })
            .then(function(result) {
                if (result.success) {
                    // Show success
                    successMessage.style.display = 'block';
                    submitBtn.textContent = 'Account Created!';
                    
                    // Redirect to login after 2 seconds
                    setTimeout(function() {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    errorMessage.textContent = result.message || 'Registration failed';
                    errorMessage.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }
            })
            .catch(function(error) {
                console.error('Registration error:', error);
                errorMessage.textContent = 'An error occurred. Please try again.';
                errorMessage.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            });
        });
    </script>
</body>
</html>
