<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - UniVote</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Face-api.js for face detection -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"
            onload="console.log('face-api.js loaded successfully'); window.faceApiLoaded = true;"
            onerror="console.error('Failed to load face-api.js from CDN'); window.faceApiLoaded = false;"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 28px;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #5a6fd6;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .success-message {
            background: #d1fae5;
            border: 1px solid #10b981;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            color: #065f46;
            display: none;
        }
        
        .error-message {
            background: #fee2e2;
            border: 1px solid #ef4444;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            color: #991b1b;
            white-space: pre-line;
            display: none;
        }
        .password-wrapper { position: relative; display: inline-block; width: 100%; }
        .password-wrapper input { width: 100%; padding-right: 40px; }
        .password-toggle {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; cursor: pointer; color: #666;
            font-size: 16px;
            padding: 5px;
            z-index: 10;
        }
        .password-toggle:hover { color: #2563eb; }
        .camera-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
        }
        .camera-container.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .camera-container video {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
        }
        .camera-container canvas {
            display: none;
        }
        .camera-controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        .btn-capture {
            padding: 12px 30px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        .btn-cancel-camera {
            padding: 12px 30px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        .btn-take-photo {
            display: inline-block;
            padding: 10px 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-top: 10px;
        }
        .photo-section-bottom {
            border: 2px dashed #667eea;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #f8f9ff 0%, #eef2ff 100%);
        }
        .photo-section-bottom .photo-preview-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #667eea;
            margin: 0 auto 15px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .photo-section-bottom .photo-preview-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
         .photo-section-bottom .photo-preview-container .placeholder {
             font-size: 40px;
             color: #667eea;
         }
         .photo-error {
             color: #ef4444;
             font-size: 13px;
             margin-top: 8px;
             text-align: left;
             white-space: pre-line;
             display: none;
         }
     </style>
</head>
<body data-page="register">
    <div class="register-card">
        <div class="logo">
            <h1>🗳️ UniVote</h1>
            <p>Create Your Account</p>
        </div>

        <div id="success-message" class="success-message">
            Account created successfully! Redirecting to login...
        </div>
        
        <div id="error-message" class="error-message"></div>

        <form id="register-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">University Email</label>
                <input type="email" id="email" placeholder="19131@imperial.edu.bd" required>
            </div>

            <div class="form-group">
                <label for="studentId">Student ID</label>
                <input type="text" id="studentId" placeholder="Enter your student ID" required>
            </div>

            <div class="form-group">
                <label for="department">Name of the Department</label>
                <select id="department" class="form-input" required>
                    <option value="">Select your department</option>
                    <option value="CSE">Computer Science & Engineering (CSE)</option>
                    <option value="EEE">Electrical & Electronic Engineering (EEE)</option>
                    <option value="CE">Civil Engineering (CE)</option>
                    <option value="ME">Mechanical Engineering (ME)</option>
                    <option value="TE">Textile Engineering (TE)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password">Create Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" placeholder="Create a password" required minlength="6" style="width: 100%; padding: 14px; padding-right: 45px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; box-sizing: border-box;">
                    <span onclick="document.getElementById('password').type = document.getElementById('password').type === 'password' ? 'text' : 'password'" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px;">👁️</span>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <div style="position: relative;">
                    <input type="password" id="confirm-password" placeholder="Confirm your password" required style="width: 100%; padding: 14px; padding-right: 45px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; box-sizing: border-box;">
                    <span onclick="document.getElementById('confirm-password').type = document.getElementById('confirm-password').type === 'password' ? 'text' : 'password'" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px;">👁️</span>
                </div>
            </div>

            <div class="photo-section-bottom">
                <label style="font-weight: 500; color: #333; display: block; margin-bottom: 10px;">Student Photo <span style="color: red;">*</span></label>
                <div class="photo-preview-container" onclick="document.getElementById('photo-input').click()">
                    <img id="photo-preview" style="display: none;" src="" alt="Preview">
                    <span class="placeholder" id="photo-placeholder">📷</span>
                </div>
                <input type="file" id="photo-input" accept="image/*" onchange="previewPhoto()" style="display: none;">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <button type="button" class="btn-take-photo" onclick="openCamera()">📷 Take Photo with Camera</button>
                    <button type="button" class="btn-take-photo" onclick="document.getElementById('photo-input').click()">📁 Upload from Gallery</button>
                </div>
                 <p style="font-size: 12px; color: #666; margin-top: 8px;">
                    Take a clear photo of your face or upload a portrait. <strong>Human face verification required.</strong>
                </p>
                <p class="photo-error" id="photo-error"></p>
                <p id="face-status" style="font-size: 12px; color: #f59e0b; margin-top: 8px; min-height: 18px;">
                    ⏳ Initializing face detection...
                </p>
            </div>

            <button type="submit" class="btn" id="submit-btn">
                Create Account
            </button>
        </form>

        <p class="login-link">
            Already have an account? <a href="login.html">Login here</a>
        </p>
    </div>

    <!-- Camera Modal -->
    <div class="camera-container" id="camera-container">
        <video id="camera-video" autoplay playsinline></video>
        <canvas id="camera-canvas"></canvas>
        <div class="camera-controls">
            <button class="btn-capture" onclick="capturePhoto()">📸 Capture Photo</button>
            <button class="btn-cancel-camera" onclick="closeCamera()">✕ Cancel</button>
        </div>
    </div>

<script>
        const FACE_RULES = {
            minBrightness: 30,
            minContrast: 18,
            minConfidence: 0.75,
            minFaceRatio: 0.08,
            maxFaceRatio: 0.7,
            maxVerificationAgeMs: 10 * 60 * 1000,
            maxUploadSizeBytes: 8 * 1024 * 1024
        };

        let photoData = null;
        let cameraStream = null;
        let faceDetectionLoaded = false;
        let landmarkModelLoaded = false;
        let loadAttempts = 0;
        const MAX_ATTEMPTS = 3;
        let faceVerified = false;
        let faceVerification = null;

        function setStatus(message, color) {
            const el = document.getElementById('face-status');
            if (!el) return;
            el.textContent = message;
            el.style.color = color;
        }

        function setPhotoError(message) {
            const el = document.getElementById('photo-error');
            if (!el) return;
            if (!message) {
                el.textContent = '';
                el.style.display = 'none';
                return;
            }
            el.textContent = message;
            el.style.display = 'block';
        }

        function waitForVideo(videoEl, timeout = 5000) {
            return new Promise((resolve, reject) => {
                if (videoEl.videoWidth > 0 && videoEl.videoHeight > 0) {
                    resolve();
                    return;
                }

                const start = Date.now();
                const timer = setInterval(() => {
                    if (videoEl.videoWidth > 0 && videoEl.videoHeight > 0) {
                        clearInterval(timer);
                        resolve();
                    } else if (Date.now() - start > timeout) {
                        clearInterval(timer);
                        reject(new Error('Camera stream timed out.'));
                    }
                }, 100);
            });
        }

        function getImageQualityMetrics(canvas) {
            const ctx = canvas.getContext('2d');
            const { data } = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const stride = 16;
            let sum = 0;
            let sumSq = 0;
            let count = 0;

            for (let i = 0; i < data.length; i += 4 * stride) {
                const lum = (data[i] * 0.299) + (data[i + 1] * 0.587) + (data[i + 2] * 0.114);
                sum += lum;
                sumSq += lum * lum;
                count++;
            }

            const brightness = count > 0 ? sum / count : 0;
            const variance = count > 0 ? (sumSq / count) - (brightness * brightness) : 0;
            const contrast = variance > 0 ? Math.sqrt(variance) : 0;

            return { brightness, contrast };
        }

        function averagePoint(points) {
            const total = points.reduce((acc, p) => ({ x: acc.x + p.x, y: acc.y + p.y }), { x: 0, y: 0 });
            return { x: total.x / points.length, y: total.y / points.length };
        }

        function distance(a, b) {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            return Math.sqrt((dx * dx) + (dy * dy));
        }

        function resolveDetection(detectionObj) {
            if (!detectionObj) return null;
            if (detectionObj.detection && detectionObj.detection.box) {
                return {
                    score: detectionObj.detection.score,
                    box: detectionObj.detection.box
                };
            }
            if (detectionObj.box && typeof detectionObj.score === 'number') {
                return {
                    score: detectionObj.score,
                    box: detectionObj.box
                };
            }
            return null;
        }

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.async = true;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function ensureFaceApiLibrary() {
            if (typeof faceapi !== 'undefined') return true;
            const sources = [
                'https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js',
                'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js'
            ];
            for (const src of sources) {
                try {
                    await loadScript(src);
                    if (typeof faceapi !== 'undefined') return true;
                } catch (scriptErr) {
                    console.warn('Face API script load failed from', src, scriptErr);
                }
            }
            return false;
        }

        async function loadModels(forceRetry) {
            if (faceDetectionLoaded) return true;
            if (!forceRetry && loadAttempts >= MAX_ATTEMPTS) return false;

            const faceApiReady = await ensureFaceApiLibrary();
            if (!faceApiReady) {
                setStatus('Face library unavailable. Check internet and refresh.', '#ef4444');
                return false;
            }

            loadAttempts++;
            setStatus('Loading face verification model...', '#f59e0b');

            try {
                const tinyCandidates = [
                    '/face-api-models',
                    './face-api-models',
                    'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights',
                    'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/weights'
                ];
                let tinyLoaded = false;
                for (const modelUrl of tinyCandidates) {
                    try {
                        await faceapi.nets.tinyFaceDetector.loadFromUri(modelUrl);
                        tinyLoaded = true;
                        break;
                    } catch (tinyErr) {
                        console.warn('Tiny model load failed from', modelUrl, tinyErr);
                    }
                }
                if (!tinyLoaded) {
                    throw new Error('Tiny face detector model could not be loaded from local/CDN paths.');
                }

                const landmarkCandidates = [
                    '/face-api-models',
                    './face-api-models',
                    'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights',
                    'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/weights'
                ];
                landmarkModelLoaded = false;
                for (const modelUrl of landmarkCandidates) {
                    try {
                        await faceapi.nets.faceLandmark68TinyNet.loadFromUri(modelUrl);
                        landmarkModelLoaded = true;
                        break;
                    } catch (landmarkErr) {
                        console.warn('Landmark model load failed from', modelUrl, landmarkErr);
                    }
                }

                faceDetectionLoaded = true;
                if (landmarkModelLoaded) {
                    setStatus('Face verification ready', '#10b981');
                } else {
                    setStatus('Face detector ready (landmark model unavailable)', '#f59e0b');
                }
                return true;
            } catch (error) {
                console.error('Face model load failed:', error);
                if (loadAttempts >= MAX_ATTEMPTS) {
                    setStatus('Face verification unavailable. Registration is blocked.', '#ef4444');
                } else {
                    setStatus('Retrying face model load...', '#f59e0b');
                    setTimeout(() => loadModels(false), 2000);
                }
                return false;
            }
        }

        async function analyzeHumanFace(canvas, source) {
            const modelReady = await loadModels(true);
            if (!modelReady) {
                return {
                    ok: false,
                    reason: 'Face verification service is not ready. Please wait and try again.'
                };
            }

            const quality = getImageQualityMetrics(canvas);
            if (quality.brightness < FACE_RULES.minBrightness) {
                return { ok: false, reason: 'Image is too dark/black. Use better lighting.' };
            }
            if (quality.contrast < FACE_RULES.minContrast) {
                return { ok: false, reason: 'Image quality is too flat. Use a clear, real portrait photo.' };
            }

            const options = new faceapi.TinyFaceDetectorOptions({
                inputSize: 416,
                scoreThreshold: 0.5
            });

            const allDetections = await faceapi.detectAllFaces(canvas, options);
            if (!allDetections || allDetections.length === 0) {
                return { ok: false, reason: 'No human face detected.' };
            }
            if (allDetections.length > 1) {
                return { ok: false, reason: 'Multiple faces detected. Only one person is allowed.' };
            }

            const singleDetection = await faceapi.detectSingleFace(canvas, options);
            const resolved = resolveDetection(singleDetection);
            if (!resolved || !resolved.box || typeof resolved.score !== 'number') {
                return {
                    ok: false,
                    reason: 'Face verification failed due to invalid detection format. Try again.'
                };
            }

            const score = resolved.score;
            const box = resolved.box;
            const faceRatio = (box.width * box.height) / (canvas.width * canvas.height);

            if (score < FACE_RULES.minConfidence) {
                return {
                    ok: false,
                    reason: `Face confidence too low (${Math.round(score * 100)}%). Use a clearer front-facing photo.`
                };
            }

            if (faceRatio < FACE_RULES.minFaceRatio) {
                return { ok: false, reason: 'Face is too small. Move closer to camera or crop tighter.' };
            }
            if (faceRatio > FACE_RULES.maxFaceRatio) {
                return { ok: false, reason: 'Face is too close to the camera. Keep full head and shoulders visible.' };
            }

            const marginsOk =
                box.x > canvas.width * 0.02 &&
                box.y > canvas.height * 0.02 &&
                (box.x + box.width) < canvas.width * 0.98 &&
                (box.y + box.height) < canvas.height * 0.98;

            if (!marginsOk) {
                return { ok: false, reason: 'Face is cropped by frame edges. Center your face fully in frame.' };
            }

            let hasLandmarks = false;
            if (landmarkModelLoaded) {
                const detectionWithLandmarks = await faceapi.detectSingleFace(canvas, options).withFaceLandmarks(true);
                if (!detectionWithLandmarks || !detectionWithLandmarks.landmarks) {
                    return {
                        ok: false,
                        reason: 'Detected object is not a valid human face. Use a real person photo only.'
                    };
                }

                const landmarks = detectionWithLandmarks.landmarks;
                const leftEye = landmarks.getLeftEye();
                const rightEye = landmarks.getRightEye();
                const nose = landmarks.getNose();
                const mouth = landmarks.getMouth();

                if (!leftEye.length || !rightEye.length || !nose.length || !mouth.length) {
                    return {
                        ok: false,
                        reason: 'Facial landmarks are incomplete. Use a clear, unobstructed human face photo.'
                    };
                }

                const leftEyeCenter = averagePoint(leftEye);
                const rightEyeCenter = averagePoint(rightEye);
                const eyeDistance = distance(leftEyeCenter, rightEyeCenter);
                if (eyeDistance < canvas.width * 0.08) {
                    return { ok: false, reason: 'Eyes are not clearly visible. Face the camera directly.' };
                }
                hasLandmarks = true;
            }

            return {
                ok: true,
                metadata: {
                    verified: true,
                    source,
                    checkedAt: new Date().toISOString(),
                    confidence: Number(score.toFixed(4)),
                    faceCount: 1,
                    faceRatio: Number(faceRatio.toFixed(4)),
                    brightness: Number(quality.brightness.toFixed(2)),
                    contrast: Number(quality.contrast.toFixed(2)),
                    hasLandmarks
                }
            };
        }

        function closeCamera() {
            const container = document.getElementById('camera-container');
            const video = document.getElementById('camera-video');
            if (container) container.classList.remove('active');
            if (video) video.srcObject = null;
            if (cameraStream) {
                cameraStream.getTracks().forEach((track) => track.stop());
                cameraStream = null;
            }
        }

        function setVerifiedPhoto(dataUrl, metadata) {
            const preview = document.getElementById('photo-preview');
            const placeholder = document.getElementById('photo-placeholder');
            if (preview) {
                preview.src = dataUrl;
                preview.style.display = 'block';
            }
            if (placeholder) {
                placeholder.style.display = 'none';
            }
            photoData = dataUrl;
            faceVerified = true;
            faceVerification = metadata;
            setStatus('Human face verified successfully', '#10b981');
            setPhotoError('');
        }

        function resetPhoto() {
            const preview = document.getElementById('photo-preview');
            const placeholder = document.getElementById('photo-placeholder');
            if (preview) {
                preview.src = '';
                preview.style.display = 'none';
            }
            if (placeholder) {
                placeholder.style.display = 'block';
            }
            photoData = null;
            faceVerified = false;
            faceVerification = null;
            setPhotoError('');
            setStatus('Please take or upload a photo for verification.', '#64748b');
        }

        async function openCamera() {
            faceVerified = false;
            faceVerification = null;
            setPhotoError('');
            loadModels(true);

            const container = document.getElementById('camera-container');
            const video = document.getElementById('camera-video');
            if (!container || !video) return;

            container.classList.add('active');
            setStatus('Requesting camera access...', '#f59e0b');

            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                video.srcObject = cameraStream;
                await waitForVideo(video);
                setStatus('Camera ready. Keep one face centered and capture.', '#10b981');
            } catch (error) {
                closeCamera();
                setPhotoError('Camera access denied. Use upload or allow camera permission.');
                setStatus('Camera unavailable', '#ef4444');
            }
        }

        async function capturePhoto() {
            const video = document.getElementById('camera-video');
            const canvas = document.getElementById('camera-canvas');
            if (!video || !canvas) return;

            setPhotoError('');
            setStatus('Capturing image...', '#f59e0b');
            faceVerified = false;
            faceVerification = null;

            try {
                await waitForVideo(video);
            } catch (error) {
                setPhotoError('Camera stream not ready. Please try again.');
                setStatus('Capture failed', '#ef4444');
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            setStatus('Verifying human face...', '#f59e0b');
            try {
                const result = await analyzeHumanFace(canvas, 'camera');
                if (!result.ok) {
                    setPhotoError(result.reason);
                    setStatus('Verification failed', '#ef4444');
                    return;
                }

                const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
                setVerifiedPhoto(dataUrl, result.metadata);
                closeCamera();
            } catch (error) {
                console.error('Camera verification error:', error);
                setPhotoError('Face verification error. Please capture again.');
                setStatus('Verification error', '#ef4444');
            }
        }

        async function previewPhoto() {
            const input = document.getElementById('photo-input');
            const canvas = document.getElementById('camera-canvas');
            if (!input || !canvas || !input.files || !input.files[0]) return;

            const file = input.files[0];
            faceVerified = false;
            faceVerification = null;
            setPhotoError('');
            setStatus('Validating uploaded image...', '#f59e0b');

            if (!/^image\/(jpeg|jpg|png|webp)$/i.test(file.type)) {
                resetPhoto();
                input.value = '';
                setPhotoError('Only JPG, PNG, or WEBP images are allowed.');
                setStatus('Invalid file type', '#ef4444');
                return;
            }

            if (file.size > FACE_RULES.maxUploadSizeBytes) {
                resetPhoto();
                input.value = '';
                setPhotoError('Image is too large. Maximum size is 8MB.');
                setStatus('File too large', '#ef4444');
                return;
            }

            const reader = new FileReader();
            reader.onload = async function onLoad(event) {
                try {
                    const img = new Image();
                    img.onload = async function onImageLoad() {
                        canvas.width = img.width;
                        canvas.height = img.height;
                        canvas.getContext('2d').drawImage(img, 0, 0);

                        setStatus('Verifying uploaded face...', '#f59e0b');
                        const result = await analyzeHumanFace(canvas, 'gallery');
                        if (!result.ok) {
                            resetPhoto();
                            input.value = '';
                            setPhotoError(result.reason + ' Upload a clear real human face photo.');
                            setStatus('Upload rejected', '#ef4444');
                            return;
                        }

                        const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
                        setVerifiedPhoto(dataUrl, result.metadata);
                    };
                    img.onerror = function onImageError() {
                        resetPhoto();
                        input.value = '';
                        setPhotoError('Uploaded image could not be read. Choose another file.');
                        setStatus('Image read failed', '#ef4444');
                    };
                    img.src = event.target.result;
                } catch (error) {
                    console.error('Upload verification error:', error);
                    resetPhoto();
                    input.value = '';
                    setPhotoError('Verification failed for uploaded photo. Try a different image.');
                    setStatus('Upload verification failed', '#ef4444');
                }
            };
            reader.onerror = function onReaderError() {
                resetPhoto();
                input.value = '';
                setPhotoError('Failed to read selected file.');
                setStatus('File read error', '#ef4444');
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('register-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const errorMsg = document.getElementById('error-message');
            const successMsg = document.getElementById('success-message');
            const btn = document.getElementById('submit-btn');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.toLowerCase().trim();
            const studentId = document.getElementById('studentId').value.trim();
            const dept = document.getElementById('department').value;
            const pwd = document.getElementById('password').value;
            const confirmPwd = document.getElementById('confirm-password').value;

            if (!name) {
                errorMsg.textContent = 'Enter name';
                errorMsg.style.display = 'block';
                return;
            }
            if (!/^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/i.test(email)) {
                errorMsg.textContent = 'Valid email required';
                errorMsg.style.display = 'block';
                return;
            }
            if (!studentId || studentId.length < 4) {
                errorMsg.textContent = 'Enter valid student ID';
                errorMsg.style.display = 'block';
                return;
            }
            if (!dept) {
                errorMsg.textContent = 'Select department';
                errorMsg.style.display = 'block';
                return;
            }
            if (pwd.length < 6) {
                errorMsg.textContent = 'Password min 6 chars';
                errorMsg.style.display = 'block';
                return;
            }
            if (pwd !== confirmPwd) {
                errorMsg.textContent = 'Passwords do not match';
                errorMsg.style.display = 'block';
                return;
            }
            if (!photoData) {
                errorMsg.textContent = 'Take or upload a photo';
                errorMsg.style.display = 'block';
                return;
            }

            if (!faceDetectionLoaded) {
                errorMsg.textContent = 'Registration denied: face verification model is not ready yet.';
                errorMsg.style.display = 'block';
                setStatus('Verification model unavailable', '#ef4444');
                return;
            }

            if (!faceVerified || !faceVerification || !faceVerification.verified) {
                errorMsg.textContent = 'Registration denied: human face verification failed.';
                errorMsg.style.display = 'block';
                setStatus('Verification required', '#ef4444');
                return;
            }

            const verificationAge = Date.now() - new Date(faceVerification.checkedAt).getTime();
            if (!Number.isFinite(verificationAge) || verificationAge > FACE_RULES.maxVerificationAgeMs) {
                errorMsg.textContent = 'Face verification expired. Please capture/upload and verify again.';
                errorMsg.style.display = 'block';
                setStatus('Verification expired', '#ef4444');
                faceVerified = false;
                faceVerification = null;
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating Account...';

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email,
                        name,
                        studentId,
                        department: dept,
                        password: pwd,
                        photo: photoData,
                        faceVerification
                    })
                });

                const result = await response.json();
                if (result.success) {
                    successMsg.style.display = 'block';
                    btn.textContent = 'Account Created!';
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    errorMsg.textContent = result.message || 'Registration failed';
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                }
            } catch (error) {
                console.error('Registration error:', error);
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });

        setStatus('Initializing face verification...', '#f59e0b');
        setTimeout(() => {
            loadModels(false);
        }, 400);

        window.addEventListener('beforeunload', closeCamera);
    </script>
</body>
</html>
