<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Candidates - UniVote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#f8fafc; --card:#ffffff; --txt:#0f172a; --muted:#64748b; --border:#e2e8f0; --primary:#2563eb; --danger:#dc2626; }
        * { box-sizing: border-box; }
        body { margin:0; font-family:'Space Grotesk',sans-serif; background:var(--bg); color:var(--txt); }
        .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
        .top { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:16px; }
        .title { font-size: 28px; font-weight:700; }
        .muted { color:var(--muted); }
        .row { display:grid; grid-template-columns: 1fr 1fr 1fr 1fr auto auto; gap:10px; margin:16px 0; }
        input { width:100%; border:1px solid var(--border); border-radius:10px; padding:10px; font:inherit; }
        .btn { border:none; border-radius:10px; padding:10px 14px; cursor:pointer; font:inherit; font-weight:600; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-danger { background:var(--danger); color:#fff; }
        .btn-outline { background:#fff; border:1px solid var(--border); }
        .card { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
        table { width:100%; border-collapse: collapse; }
        th, td { padding:12px 10px; border-bottom:1px solid var(--border); text-align:left; }
        th { background:#f1f5f9; font-weight:600; }
        .symbol { font-size: 24px; }
        .status { margin-top: 10px; min-height: 20px; color: var(--muted); }
        .ok { color:#15803d; }
        .err { color:#b91c1c; }
        @media (max-width:900px){ .row{ grid-template-columns:1fr 1fr; } }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="top">
            <div>
                <div class="title">Manage Candidates</div>
                <div class="muted">Add or delete candidates. Changes sync to voting and results APIs.</div>
            </div>
            <div>
                <button class="btn btn-outline" onclick="window.location.href='admin-dashboard.html'">Back to Dashboard</button>
            </div>
        </div>

        <div class="card" style="padding:14px;">
            <div class="row">
                <input id="name" placeholder="Candidate name">
                <input id="department" placeholder="Designation / Department">
                <input id="symbol" placeholder="Symbol (e.g. 📖)">
                <input id="symbolName" placeholder="Symbol name">
                <input id="color" placeholder="Color (#2563eb)">
                <button class="btn btn-primary" onclick="addCandidate()">Add</button>
            </div>
            <div class="status" id="status"></div>
        </div>

        <div class="card" style="margin-top:14px;">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Symbol</th>
                        <th>Name</th>
                        <th>Designation</th>
                        <th>Symbol Name</th>
                        <th>Color</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="candidate-rows"></tbody>
            </table>
        </div>
    </div>

    <script>
        const ADMIN_KEY = 'admin2026';

        function setStatus(message, ok) {
            const el = document.getElementById('status');
            el.textContent = message || '';
            el.className = 'status ' + (message ? (ok ? 'ok' : 'err') : '');
        }

        async function fetchJson(url, options) {
            const res = await fetch(url, options);
            const text = await res.text();
            let data = {};
            try { data = text ? JSON.parse(text) : {}; } catch { data = { success:false, message:'Unexpected response from server' }; }
            if (!res.ok || data.success === false) throw new Error(data.message || 'Request failed');
            return data;
        }

        async function loadCandidates() {
            try {
                setStatus('Loading candidates...', true);
                const data = await fetchJson('/api/admin/candidates?adminKey=' + encodeURIComponent(ADMIN_KEY));
                const rows = document.getElementById('candidate-rows');
                const list = Array.isArray(data.candidates) ? data.candidates : [];
                rows.innerHTML = list.map(c => `
                    <tr>
                        <td>${c.id}</td>
                        <td class="symbol">${c.symbol || '-'}</td>
                        <td>${c.name || '-'}</td>
                        <td>${c.department || '-'}</td>
                        <td>${c.symbolName || '-'}</td>
                        <td>${c.color || '-'}</td>
                        <td><button class="btn btn-danger" onclick="deleteCandidate(${c.id}, '${(c.name || '').replace(/'/g, "\\'")}')">Delete</button></td>
                    </tr>
                `).join('');
                if (!list.length) rows.innerHTML = '<tr><td colspan="7" class="muted">No candidates found</td></tr>';
                setStatus('Candidates loaded', true);
            } catch (error) {
                setStatus(error.message, false);
            }
        }

        async function addCandidate() {
            const name = document.getElementById('name').value.trim();
            const department = document.getElementById('department').value.trim();
            const symbol = document.getElementById('symbol').value.trim();
            const symbolName = document.getElementById('symbolName').value.trim();
            const color = document.getElementById('color').value.trim() || '#2563eb';

            if (!name || !department || !symbol || !symbolName) {
                setStatus('Name, designation, symbol, and symbol name are required', false);
                return;
            }

            try {
                await fetchJson('/api/admin/candidates', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminKey: ADMIN_KEY, name, department, symbol, symbolName, color })
                });
                document.getElementById('name').value = '';
                document.getElementById('department').value = '';
                document.getElementById('symbol').value = '';
                document.getElementById('symbolName').value = '';
                document.getElementById('color').value = '';
                setStatus('Candidate added successfully', true);
                await loadCandidates();
            } catch (error) {
                setStatus(error.message, false);
            }
        }

        async function deleteCandidate(id, name) {
            if (!confirm(`Delete candidate "${name}" (ID: ${id})?`)) return;
            try {
                await fetchJson('/api/admin/candidates/' + encodeURIComponent(id) + '?adminKey=' + encodeURIComponent(ADMIN_KEY), {
                    method: 'DELETE'
                });
                setStatus('Candidate deleted successfully', true);
                await loadCandidates();
            } catch (error) {
                setStatus(error.message, false);
            }
        }

        loadCandidates();
    </script>
</body>
</html>
